[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[functions.ai-sales-chat]
verify_jwt = false

# Twilio MMS webhook: Twilio doesn't include our JWT, just signs the
# request body. Auth here is implicit via the From-number → request
# row match (and could be tightened with Twilio signature validation
# in a future hardening pass).
[functions.twilio-mms-webhook]
verify_jwt = false

# Public confirm/track pages hit this with anon key only — view_token
# IS the auth (and auto-expires 12h after appointment_date).
[functions.appointment-self-service]
verify_jwt = false

# Cron-only fns: they're invoked exclusively by pg_cron via pg_net.http_post.
# verify_jwt=false matches the pattern used by remind-lab-request-patients,
# reconcile-stripe-payments, daily-owner-brief, etc. The body has no
# user-input — these just iterate DB rows on a schedule.
[functions.remind-lab-order-requests]
verify_jwt = false

[functions.send-confirmation-requests]
verify_jwt = false

# Patient lab-order upload page hits this with the anon key only.
# Token-based auth on the appointment_lab_order_requests row IS the
# auth — we never trust the caller for anything beyond "I have this token."
[functions.submit-appointment-lab-order]
verify_jwt = false

[functions.process-org-invoice-dunning]
