    <div id="root"></div>
    <!-- ConveLabs is online-only and registers NO service worker. Kill any
         legacy worker + caches here, at the logo stage (before the app bundle).
         SELF-HEAL for the mobile refresh loop: if an OLD self-destructing worker
         is still CONTROLLING this page, unregistering it isn't enough — it keeps
         control until the page reloads without it. So do exactly ONE gated
         reload to drop the controller, then the device loads clean and never
         registers a worker again. Devices with no worker never reload here. -->
    <script>
      (function(){
        try {
          if ('caches' in window) {
            caches.keys().then(function(names){ names.forEach(function(n){ try { caches.delete(n); } catch(e){} }); }).catch(function(){});
          }
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs){
              var had = regs && regs.length > 0;
              regs.forEach(function(reg){ try { reg.unregister(); } catch(e){} });
              var controlled = !!navigator.serviceWorker.controller;
              var already = false;
              try { already = sessionStorage.getItem('__sw_reset') === '1'; } catch(e){}
              if (had && controlled && !already) {
                try { sessionStorage.setItem('__sw_reset', '1'); } catch(e){}
                location.reload();
              }
            }).catch(function(){});
          }
        } catch(e){}
      })();
    </script>
